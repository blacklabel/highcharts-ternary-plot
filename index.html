<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Ternary Plot test</title>

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <script src="./js/ternaryPlot.js"></script>
</head>

<body>
    <div id="container" style="height: 600px"></div>

    <script>
        const URLS = {
            renewables: "https://ourworldindata.org/grapher/share-electricity-renewables.csv",
            fossil: "https://ourworldindata.org/grapher/share-electricity-fossil-fuels.csv",
            nuclear: "https://ourworldindata.org/grapher/share-electricity-nuclear.csv",
        };
 
        const TARGETS = new Set([
            "World",
            "United States",
            "Europe (EI)",
            "China",
            "India",
        ]);

        function parseCSV(text) {
            const [header, ...rows] = text.trim().split("\n");
            const cols = header.split(",");
            return rows.map(r => {
                const vals = r.split(",");
                return Object.fromEntries(cols.map((c, i) => [c, vals[i]]));
            });
        }

        async function loadSeries(url, valueKey) {
            const res = await fetch(url);
            const csv = await res.text();
            const rows = parseCSV(csv);

            const valueCol = Object.keys(rows[0]).find(
                k => !["Entity", "Code", "Year"].includes(k)
            );

            return rows.map(r => ({
                entity: r.Entity,
                year: Number(r.Year),
                [valueKey]: Number(r[valueCol]),
            }));
        }

        async function getData() {
            const ren = await loadSeries(URLS.renewables, "renewables");
            const fos = await loadSeries(URLS.fossil, "fossil");
            const nuc = await loadSeries(URLS.nuclear, "nuclear");

            const map = new Map();
            for (const r of [...ren, ...fos, ...nuc]) {
                if (!TARGETS.has(r.entity)) continue;
                const key = `${r.entity}-${r.year}`;
                map.set(key, { ...(map.get(key) || {}), ...r });
            }

            let data = [...map.values()]
                .filter(d => d.renewables != null && d.fossil != null && d.nuclear != null)
                .sort((a, b) => a.entity.localeCompare(b.entity) || a.year - b.year);

            // Last 10 years per entity
            data = Object.values(
                data.reduce((acc, d) => {
                    acc[d.entity] ??= [];
                    acc[d.entity].push(d);
                    return acc;
                }, {})
            ).flatMap(arr => arr.slice(-10));

            // Round and sanity check (≈100%)
            data = data.map(d => ({
                entity: d.entity,
                year: d.year,
                renewables: +d.renewables.toFixed(2),
                fossil: +d.fossil.toFixed(2),
                nuclear: +d.nuclear.toFixed(2),
                sum: +(d.renewables + d.fossil + d.nuclear).toFixed(2),
            }));

            console.table(data);
            return data;
        }

        async function init() {
            const rawData = await getData();

            const grouped = rawData.reduce((acc, d) => {
                (acc[d.entity] ??= []).push(d);
                return acc;
            }, {});

            Highcharts.chart('container', {

                chart: {
                    ternary: true,
                    // ternarySpacing: 25
                },

                title: {
                    text: 'Changes in Electricity Generation Mix (%)<br/>2015-2024'
                },

                subtitle: {
                    text: `Each sequence shows annual progression from 2015 to 2024.<br/>
                        Data source: Our World in Data`
                },

                ternaryAxis: [{
                    tickInterval: 10,
                    lineColor: 'red',
                    title: {
                        useHTML: true,
                        text: 'higher renewables share (%) --->',
                        y: '-40px'
                    }
                }, {
                    tickInterval: 10,
                    title: {
                        text: '<--- higher ossil share (%)'
                    }
                }, {
                    tickInterval: 10,
                    title: {
                        text: '<--- higher nuclear share (%)'
                    }
                }],

                series: [...TARGETS]
                    .filter(entity => grouped[entity])
                    .map(entity => ({
                        type: 'ternaryscatter',
                        name: entity,
                        keys: ['x', 'y', 'z', 'entity', 'year', 'marker'],
                        data: grouped[entity].map(d => ([
                            d.renewables,
                            d.fossil,
                            d.nuclear,
                            d.entity,
                            d.year,
                            d.year === 2024 ? { radius: 5 } : undefined
                        ])),
                        tooltip: {
                            pointFormat: '<b>{point.entity} ({point.year}):</b><br/>' +
                                'Renewables share: {point.x}%<br/>' +
                                'Ossil: {point.y}%<br/>' +
                                'Nuclear: {point.z}%'
                        },
                        marker: {
                            radius: 2
                        },
                        lineWidth: 0.5
                    }))

            });
        }

        init();

        console.log('chart created');
    </script>
</body>

</html>
